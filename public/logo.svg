<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#020617"></rect>

  <!-- Border glow -->
  <rect x="20" y="20" width="472" height="472" rx="95" stroke="url(#borderGradient)" stroke-width="18"></rect>

  <!-- Soft inner glow -->
  <circle cx="256" cy="256" r="170" fill="#2563EB" opacity="0.16"></circle>
  <circle cx="320" cy="190" r="120" fill="#00E5FF" opacity="0.12"></circle>

  <!-- Text -->
  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" font-family="Arial, Helvetica, sans-serif" font-size="220" font-weight="900" letter-spacing="-18" fill="white">
    PS
  </text>

  <!-- Dot -->
  <circle cx="405" cy="352" r="25" fill="#00E5FF"></circle>

  <defs>
    <linearGradient id="borderGradient" x1="60" y1="60" x2="452" y2="452" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"></stop>
      <stop offset="1" stop-color="#00E5FF"></stop>
    </linearGradient>
  </defs>
</svg>